name: Publish

on:
  release:
    types: [ published ]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3
        with:
          node-version: '24.16.0' # lts
          registry-url: 'https://registry.npmjs.org'

      - name: Install wasm-pack
        run: |
          curl -L https://github.com/wasm-bindgen/wasm-pack/releases/download/v${{ vars.WASM_PACK_VERSION }}/wasm-pack-v${{ vars.WASM_PACK_VERSION }}-x86_64-unknown-linux-musl.tar.gz | tar xz
          sudo mv wasm-pack-*/wasm-pack /usr/local/bin/

      - name: Install wasm-bindgen-cli
        run: |
          curl -L https://github.com/wasm-bindgen/wasm-bindgen/releases/download/${{ vars.WASM_BINDGEN_VERSION }}/wasm-bindgen-${{ vars.WASM_BINDGEN_VERSION }}-x86_64-unknown-linux-musl.tar.gz | tar xz
          sudo mv wasm-bindgen-*/wasm-bindgen /usr/local/bin/
          sudo mv wasm-bindgen-*/wasm-bindgen-test-runner /usr/local/bin/

      - name: Install wasm-opt
        run: |
          curl -L https://github.com/WebAssembly/binaryen/releases/download/version_${{ vars.WASM_OPT_VERSION }}/binaryen-version_${{ vars.WASM_OPT_VERSION }}-x86_64-linux.tar.gz | tar xz
          sudo mv binaryen-*/bin/wasm-opt /usr/local/bin/

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Run Native tests
        run: make test

      - name: Check npm version bump
        id: npm_version
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view mldsa65-wasm version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL" = "$PUBLISHED" ]; then
          echo "skip_npm=true" >> "$GITHUB_OUTPUT"
          else
          echo "skip_npm=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check crate version bump
        id: crate_version
        run: |
          LOCAL=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          PUBLISHED=$(cargo search mldsa65 --limit 1 | head -1 | sed 's/.*"\(.*\)".*/\1/' || echo "0.0.0")
          if [ "$LOCAL" = "$PUBLISHED" ]; then
            echo "skip_crates=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_crates=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check core version bump
        id: core_version
        run: |
          LOCAL=$(grep '^version' crates/mldsa-core/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          PUBLISHED=$(cargo search mldsa-core --limit 1 | head -1 | sed 's/.*"\(.*\)".*/\1/' || echo "0.0.0")
          if [ "$LOCAL" = "$PUBLISHED" ]; then
            echo "skip_core=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_core=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1

      - name: Publish core to crates.io
        if: steps.core_version.outputs.skip_core == 'false'
        run: make publish-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Publish variants to crates.io
        if: steps.crate_version.outputs.skip_crates == 'false'
        run: make publish-crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Run WASM tests
        run: make test-wasm

      - name: Build npm packages
        run: make wasm

      - name: Publish to npm
        if: steps.npm_version.outputs.skip_npm == 'false'
        run: make publish-npm
